<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senoritas | Coming Soon</title>
  <meta name="description" content="Senoritas — Breakfast, Lunch & Dinner. Coming Soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f47c20;
      --red:    #c0392b;
      --dark:   #0a0a0a;
      --white:  #ffffff;
      --gray:   #999;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── BACKGROUND SLIDESHOW ─────────────────────────────────── */
    .bg-slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-slideshow .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.8s ease-in-out;
    }
    .bg-slideshow .slide.active { opacity: 1; }
    .bg-slideshow::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,.72) 0%,
          rgba(0,0,0,.45) 40%,
          rgba(0,0,0,.75) 100%);
    }

    /* Slides — high-res Unsplash food photography */
    .slide-1 { background-image: url('https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=1800&q=80'); }
    .slide-2 { background-image: url('https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=1800&q=80'); }
    .slide-3 { background-image: url('https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?w=1800&q=80'); }
    .slide-4 { background-image: url('https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?w=1800&q=80'); }
    .slide-5 { background-image: url('https://images.unsplash.com/photo-1607631568010-a87245c0daf8?w=1800&q=80'); }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 48px;
      text-align: center;
    }

    /* ── LOGO ────────────────────────────────────────────────── */
    .logo-wrap {
      margin-bottom: 24px;
      animation: fadeDown .9s ease both;
    }
    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 12vw, 130px);
      letter-spacing: .04em;
      line-height: 1;
      background: linear-gradient(180deg, #f5a623 0%, #e8621a 45%, #c0392b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 4px 24px rgba(200,60,30,.45));
    }
    .logo-banner {
      display: inline-block;
      background: linear-gradient(90deg, #8b1a12 0%, #c0392b 50%, #8b1a12 100%);
      padding: 10px 40px;
      margin-top: 6px;
      clip-path: polygon(12px 0%, calc(100% - 12px) 0%, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0% 50%);
      font-family: 'Oswald', sans-serif;
      font-size: clamp(13px, 2vw, 18px);
      font-weight: 600;
      letter-spacing: .25em;
      color: #fff;
    }
    .logo-banner span { margin: 0 10px; opacity: .7; }

    /* ── COMING SOON HEADLINE ────────────────────────────────── */
    .headline-wrap {
      margin-bottom: 28px;
      animation: fadeUp .9s .2s ease both;
    }
    .headline-eyebrow {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(11px, 1.6vw, 14px);
      letter-spacing: .35em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .headline-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 8vw, 96px);
      letter-spacing: .06em;
      line-height: 1;
      white-space: nowrap;
      color: var(--white);
      text-shadow: 0 2px 40px rgba(0,0,0,.9);
    }
    .headline-sub {
      font-size: clamp(13px, 1.4vw, 15px);
      font-weight: 300;
      color: rgba(255,255,255,.65);
      margin-top: 10px;
      max-width: 380px;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* ── DIVIDER ─────────────────────────────────────────────── */
    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--red));
      margin: 0 auto 28px;
      border-radius: 2px;
      animation: fadeUp .9s .3s ease both;
    }


    /* ── EMAIL FORM ──────────────────────────────────────────── */
    .notify-wrap {
      animation: fadeUp .9s .5s ease both;
      margin-bottom: 28px;
    }
    .notify-label {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(12px, 1.6vw, 14px);
      letter-spacing: .25em;
      color: rgba(255,255,255,.55);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .notify-form {
      display: flex;
      gap: 0;
      max-width: 480px;
      margin-inline: auto;
      border: 1.5px solid rgba(244,124,32,.5);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .notify-form:focus-within { border-color: var(--orange); }
    .notify-form input {
      flex: 1;
      background: rgba(255,255,255,.07);
      border: none;
      outline: none;
      padding: 14px 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
    }
    .notify-form input::placeholder { color: rgba(255,255,255,.35); }
    .notify-form button {
      background: linear-gradient(135deg, var(--orange), var(--red));
      border: none;
      padding: 14px 28px;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
    }
    .notify-form button:hover { opacity: .88; }
    .notify-form button:active { transform: scale(.97); }
    .notify-success {
      display: none;
      color: var(--orange);
      font-family: 'Oswald', sans-serif;
      letter-spacing: .15em;
      font-size: 15px;
    }


    /* ── FOOTER NOTE ─────────────────────────────────────────── */
    .footer-note {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: .12em;
      color: rgba(255,255,255,.2);
      z-index: 2;
      text-transform: uppercase;
    }

    /* ── SLIDE INDICATORS ────────────────────────────────────── */
    .slide-dots {
      position: fixed;
      bottom: 50px;
      right: 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .3s, transform .3s;
      cursor: pointer;
    }
    .dot.active {
      background: var(--orange);
      transform: scale(1.4);
    }

    /* ── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 520px) {
      .countdown-sep { display: none; }
      .notify-form { flex-direction: column; border-radius: 6px; }
      .notify-form button { border-radius: 0; }
      .logo-banner { clip-path: none; border-radius: 4px; }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND SLIDESHOW -->
  <div class="bg-slideshow" id="slideshow">
    <div class="slide slide-1 active"></div>
    <div class="slide slide-2"></div>
    <div class="slide slide-3"></div>
    <div class="slide slide-4"></div>
    <div class="slide slide-5"></div>
  </div>

  <!-- SLIDE DOTS -->
  <div class="slide-dots" id="dots">
    <div class="dot active" data-index="0"></div>
    <div class="dot" data-index="1"></div>
    <div class="dot" data-index="2"></div>
    <div class="dot" data-index="3"></div>
    <div class="dot" data-index="4"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="page">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-title">SENORITAS</div>
      <div class="logo-banner">BREAKFAST<span>•</span>LUNCH<span>•</span>DINNER</div>
    </div>

    <!-- HEADLINE -->
    <div class="headline-wrap">
      <p class="headline-eyebrow">Something delicious is on its way</p>
      <h1 class="headline-main">COMING SOON</h1>
      <p class="headline-sub">Bold flavors, warm vibes & unforgettable meals — opening soon.</p>
    </div>

    <div class="divider"></div>


    <!-- EMAIL NOTIFY -->
    <div class="notify-wrap">
      <p class="notify-label">Be the first to know</p>
      <form class="notify-form" id="notifyForm">
        <input type="email" placeholder="Your email address" required />
        <button type="submit">Notify Me</button>
      </form>
      <p class="notify-success" id="notifySuccess">🎉 &nbsp;You're on the list — see you soon!</p>
    </div>


  </main>

  <p class="footer-note">© 2025 Senoritas Restaurant &nbsp;·&nbsp; All Rights Reserved</p>

  <script>

    // ── SLIDESHOW ─────────────────────────────────────────────────
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.dot');
    let current  = 0;

    function goTo(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = n;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.index)));
    setInterval(() => goTo((current + 1) % slides.length), 5000);

    // ── EMAIL FORM ────────────────────────────────────────────────
    document.getElementById('notifyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('notifySuccess').style.display = 'block';
    });
  </script>
</body>
</html>
